        <form id="form-experiencia">

                    <div class="grupo">
                        <label>Empresa</label>

                        <div class="grupo">
                            <label>Fecha Fin</label>
                            <input type="date">
                        </div>
                    </div>

                </div>
            </div>

            <button type="button">Agregar Experiencia</button>

            <div class="botones">
