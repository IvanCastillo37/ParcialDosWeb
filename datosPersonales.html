<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Datos Personales</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Hoja de Vida</h1>
</header>

<nav>
    <ul>
        <li><a href="datosPersonales.html">Datos Personales</a></li>
        <li><a href="educacionBasica.html">Formación Académica</a></li>
        <li><a href="experienciaLaboral.html">Experiencia Laboral</a></li>
        <li><a href="index.html">Inicio</a></li>
    </ul>
</nav>

<main>
    <section>
        <h2>Datos Personales</h2>

        <form id="form-datos">

            <!-- NOMBRES Y APELLIDOS -->
            <div class="fila">
                <div class="grupo">
                    <label>Nombres</label>
                    <input type="text" id="nombres">
                </div>

                <div class="grupo">
                    <label>Apellidos</label>
                    <input type="text" id="apellidos">
                </div>
            </div>

            <!-- DOCUMENTO -->
            <div class="fila">
                <div class="grupo">
                    <label>Tipo de Documento</label>
                    <select id="tipo-documento">
                        <option value="">Seleccione</option>
                        <option value="CC">Cédula de Ciudadanía</option>
                        <option value="CE">Cédula de Extranjería</option>
                        <option value="PAS">Pasaporte</option>
                    </select>
                </div>

                <div class="grupo">
                    <label>Número de Documento</label>
                    <input type="text" id="documento">
                </div>
            </div>

            <!-- LIBRETA MILITAR -->
            <div class="grupo">
                <label>¿Posee Libreta Militar?</label>
                <select id="libreta">
                    <option value="">Seleccione</option>
                    <option value="si">Sí</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="grupo">
                <label>Número de Libreta Militar</label>
                <input type="text" id="numero-libreta">
            </div>

            <!-- NACIMIENTO -->
            <div class="fila">
                <div class="grupo">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="fecha-nacimiento">
                </div>

                <div class="grupo">
                    <label>Lugar de Nacimiento</label>
                    <input type="text" id="lugar-nacimiento">
                </div>
            </div>

            <!-- DIRECCIÓN -->
            <h3>Dirección Actual</h3>

            <div class="fila">
                <div class="grupo">
                    <label>País</label>
                    <input type="text" id="pais">
                </div>

                <div class="grupo">
                    <label>Departamento</label>
                    <input type="text" id="departamento">
                </div>

                <div class="grupo">
                    <label>Ciudad</label>
                    <input type="text" id="ciudad">
                </div>
            </div>

            <!-- CONTACTO -->
            <div class="fila">
                <div class="grupo">
                    <label>Celular</label>
                    <input type="text" id="celular">
                </div>

                <div class="grupo">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo">
                </div>
            </div>

            <!-- BOTONES -->
            <div class="botones">
                <button type="button">Previsualizar</button>
            </div>

        </form>
    </section>
</main>

<footer>
    <p>Desarrollo Web</p>
</footer>

</body>
</html>
